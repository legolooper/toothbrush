<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Tab</title>
    <link rel="stylesheet" href="style.css">
    <!-- Load PeerJS securely -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
    <style>
        body {
            background-color: #1a1a1a;
            background-image: linear-gradient(135deg, #1f1f1f 25%, transparent 25%), linear-gradient(225deg, #1f1f1f 25%, transparent 25%), linear-gradient(45deg, #1f1f1f 25%, transparent 25%), linear-gradient(315deg, #1f1f1f 25%, transparent 25%);
            background-position: 40px 0, 40px 0, 0 0, 0 0;
            background-size: 80px 80px;
            animation: moveBg 40s linear infinite;
            display: flex; flex-direction: column;
        }
        @keyframes moveBg { from { background-position: 40px 0; } to { background-position: 540px 500px; } }

        /* Custom UI Styles */
        .choice-container {
            background: #1f1f1f; padding: 40px; border-radius: 25px; 
            border: 1px solid #333; text-align: center; width: 380px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .chat-msg {
            padding: 12px 18px; border-radius: 15px; background: rgba(0,0,0,0.6);
            border: 4px solid; max-width: 80%; margin-bottom: 12px; color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        .pin-input-large {
            font-size: 28px; text-align: center; letter-spacing: 5px; background: #121212;
            border: 2px solid #333; color: white; width: 100%; border-radius: 12px; padding: 15px;
            margin-bottom: 15px; outline: none;
        }

        .overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center;
        }

        .status-header { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.3); padding: 5px 15px; border-radius: 20px; font-size: 11px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #555; }
    </style>
</head>
<body>
    <header>
        <h1 onclick="location.href='index.html'">Toothbrush Chat</h1>
        
        <div class="status-header">
            <div id="status-dot" class="status-dot"></div>
            <span id="status-text">Network Offline</span>
        </div>

        <div id="room-header-info" style="display:none; font-weight:bold; margin-left: 20px;">
            <span id="display-room-name"></span> | <span id="display-pin"></span>
        </div>

        <div class="controls">
            <button id="disband-btn" class="save-btn" style="background:#B71C1C; display:none;">Disband</button>
            <button onclick="location.href='index.html'" class="save-btn" style="background:#555;">Back</button>
        </div>
    </header>

    <!-- Chat Home Page -->
    <main id="chat-home" style="display:flex; align-items:center; justify-content:center; flex:1;">
        <div class="choice-container">
            <h2 style="margin-bottom:20px; color:#fff;">Enter PIN</h2>
            <input type="text" id="pin-entry" class="pin-input-large" placeholder="000000" maxlength="6">
            <div id="pin-error" style="color:#f44336; margin-bottom:15px; display:none; font-weight:bold;">Room not found!</div>
            <button id="join-btn" class="save-btn" style="background:#2E7D32; width:100%; height:55px; font-size:18px;">Join Room</button>
            
            <div style="margin:25px 0; color:#444; font-weight:bold;">OR</div>
            
            <button id="open-host-panel" class="save-btn" style="background:rgba(255,255,255,0.05); border:1px solid #444; width:100%;">Host New Room</button>
        </div>
    </main>

    <!-- Host Modal -->
    <div id="host-modal" class="overlay">
        <div style="background:#1f1f1f; padding:35px; border-radius:20px; width:350px; border:1px solid #444;">
            <h3 style="margin-bottom:20px;">Host Room</h3>
            <input type="text" id="host-name-input" placeholder="Room Name" class="pin-input-large" style="font-size:18px; letter-spacing:0;">
            <input type="text" id="host-pin-input" placeholder="6-Digit PIN" maxlength="6" class="pin-input-large">
            <button id="start-host-btn" class="save-btn" style="background:#2E7D32; width:100%; height:50px;">Go Live</button>
            <button onclick="document.getElementById('host-modal').style.display='none'" class="save-btn" style="background:#444; width:100%; margin-top:10px;">Cancel</button>
        </div>
    </div>

    <!-- Active Chat Room -->
    <main id="chat-room" style="display:none; flex-direction:column; flex:1; height: calc(100vh - 70px);">
        <div id="messages" style="flex:1; overflow-y:auto; padding:30px; display:flex; flex-direction:column;"></div>
        <div style="padding:20px; background:#1f1f1f; display:flex; gap:12px; border-top:1px solid #333;">
            <input type="text" id="msg-input" placeholder="Type a message..." style="flex:1; background:#121212; border:1px solid #444; color:white; padding:15px; border-radius:12px; outline:none;">
            <button id="send-btn" class="save-btn" style="background:#2E7D32; padding:0 30px;">Send</button>
        </div>
    </main>

    <script>
        // Use DOMContentLoaded to ensure buttons are clickable
        document.addEventListener('DOMContentLoaded', () => {
            console.log("Toothbrush Chat Ready");

            const colorMap = {"#F44336":"Crimson","#E91E63":"Rose","#9C27B0":"Purple","#673AB7":"Indigo","#2196F3":"Azure","#00BCD4":"Cyan","#009688":"Teal","#4CAF50":"Leaf","#8BC34A":"Lime","#FFEB3B":"Gold","#FF9800":"Orange","#795548":"Cedar","#607D8B":"Steel","#636B2F":"Olive","#D4E157":"Pear","#26C6DA":"Sky"};
            const colors = Object.keys(colorMap);
            let myColor = colors[Math.floor(Math.random()*colors.length)];
            let myName = colorMap[myColor] + "_" + Math.floor(Math.random()*999);
            
            let peer = null, conn = null, isHost = false, connections = [];
            const VERSION = "tb-v11-"; 

            function setStatus(type, text) {
                const dot = document.getElementById('status-dot');
                const txt = document.getElementById('status-text');
                txt.textContent = text;
                dot.style.background = (type === 'ready') ? '#4CAF50' : (type === 'loading') ? '#FFEB3B' : '#f44336';
                dot.style.boxShadow = (type === 'ready') ? "0 0 10px #4CAF50" : "none";
            }

            // BUTTON: Open Host Modal
            document.getElementById('open-host-panel').onclick = () => {
                document.getElementById('host-modal').style.display='flex';
            };

            // BUTTON: Host Room
            document.getElementById('start-host-btn').onclick = () => {
                const name = document.getElementById('host-name-input').value.trim();
                const pin = document.getElementById('host-pin-input').value.trim();
                if(name && pin.length === 6) {
                    isHost = true;
                    startPeer(pin, name);
                } else { alert("Enter a Name and 6-Digit PIN"); }
            };

            // BUTTON: Join Room
            document.getElementById('join-btn').onclick = () => {
                const pin = document.getElementById('pin-entry').value.trim();
                if(pin.length === 6) {
                    isHost = false;
                    startPeer(null, null, pin);
                } else { alert("Enter a 6-digit PIN"); }
            };

            function startPeer(pin, roomName, joinPin) {
                setStatus('loading', 'Connecting...');
                const id = isHost ? VERSION + pin : null;
                
                if(peer) peer.destroy();
                peer = new Peer(id, {
                    debug: 1,
                    config: { 'iceServers': [{ url: 'stun:stun.l.google.com:19302' }, { url: 'stun:stun1.l.google.com:19302' }] }
                });

                peer.on('open', () => {
                    if (isHost) {
                        setStatus('ready', 'Room Live');
                        setupUI(roomName, pin);
                    } else {
                        connectToHost(document.getElementById('pin-entry').value.trim());
                    }
                });

                peer.on('connection', (c) => {
                    if (isHost) {
                        c.on('open', () => {
                            connections.push(c);
                            c.send({type: 'room-info', name: roomName, pin: pin});
                        });
                        c.on('data', (data) => handleData(data, c));
                    }
                });

                peer.on('error', (err) => {
                    setStatus('error', 'Peer Error');
                    if (err.type === 'peer-unavailable') {
                        document.getElementById('pin-error').style.display = 'block';
                    }
                });
            }

            function connectToHost(pin) {
                conn = peer.connect(VERSION + pin, { reliable: true });
                conn.on('open', () => {
                    setStatus('ready', 'Joined Room');
                    conn.send({type: 'join', name: myName, color: myColor});
                });
                conn.on('data', handleData);
                setTimeout(() => { if(!conn.open) setStatus('error', 'Host Offline'); }, 8000);
            }

            function handleData(data, sender) {
                if (data.type === 'msg') appendMessage(data.name, data.color, data.text);
                if (data.type === 'room-info') setupUI(data.name, data.pin);
                if (data.type === 'disband') { alert("Host closed the room."); location.reload(); }
                if (isHost && data.type === 'join') {
                    sender.metadata = { name: data.name };
                    appendMessage("System", "#777", data.name + " joined.");
                    connections.forEach(c => { if(c.open && c.peer !== sender.peer) c.send({type:'msg', name:'System', color:'#777', text: data.name + " joined."}); });
                }
            }

            function setupUI(name, pin) {
                document.getElementById('chat-home').style.display = 'none';
                document.getElementById('host-modal').style.display = 'none';
                document.getElementById('chat-room').style.display = 'flex';
                document.getElementById('room-header-info').style.display = 'block';
                document.getElementById('display-room-name').textContent = name;
                document.getElementById('display-pin').textContent = "PIN: " + pin;
                if(isHost) document.getElementById('disband-btn').style.display = 'block';
            }

            function appendMessage(name, color, text) {
                const area = document.getElementById('messages');
                const div = document.createElement('div');
                div.className = "chat-msg";
                div.style.borderColor = color;
                div.style.alignSelf = (name === myName) ? "flex-end" : "flex-start";
                div.innerHTML = `<div style="font-size:11px; font-weight:bold; color:${color}; margin-bottom:4px;">${name}</div><div>${text}</div>`;
                area.appendChild(div);
                area.scrollTop = area.scrollHeight;
            }

            function sendMessage() {
                const input = document.getElementById('msg-input');
                const val = input.value.trim();
                if(!val) return;
                appendMessage(myName, myColor, val);
                const p = {type: 'msg', name: myName, color: myColor, text: val};
                if(isHost) connections.forEach(c => { if(c.open) c.send(p); });
                else if(conn && conn.open) conn.send(p);
                input.value = "";
            }

            document.getElementById('send-btn').onclick = sendMessage;
            document.getElementById('msg-input').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
            document.getElementById('disband-btn').onclick = () => {
                if(confirm("Close room?")) {
                    connections.forEach(c => { if(c.open) c.send({type: 'disband'}); });
                    location.reload();
                }
            };
        });
    </script>
</body>
</html>
