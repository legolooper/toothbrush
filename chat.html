<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Tab</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
    <style>
        body {
            background-color: #1a1a1a;
            background-image: linear-gradient(135deg, #1f1f1f 25%, transparent 25%), linear-gradient(225deg, #1f1f1f 25%, transparent 25%), linear-gradient(45deg, #1f1f1f 25%, transparent 25%), linear-gradient(315deg, #1f1f1f 25%, transparent 25%);
            background-position: 40px 0, 40px 0, 0 0, 0 0; background-size: 80px 80px;
            animation: moveBg 40s linear infinite; display: flex; flex-direction: column;
        }
        @keyframes moveBg { from { background-position: 40px 0; } to { background-position: 540px 500px; } }

        /* RE-ADDED STATUS HEADER STYLES */
        .status-header { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.3); padding: 5px 15px; border-radius: 20px; font-size: 11px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #555; }

        .online-stats { display: flex; align-items: center; gap: 10px; margin-left: 15px; }
        .online-count { color: white; font-weight: bold; font-size: 16px; }
        .online-hint { color: #777; font-weight: bold; font-size: 10px; }

        .chat-msg {
            padding: 12px 18px; border-radius: 15px; background: rgba(0,0,0,0.6);
            border: 4px solid; max-width: 80%; margin-bottom: 12px; color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        .list-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 500px; background: #1f1f1f; border: 2px solid #333;
            padding: 25px; border-radius: 20px; z-index: 5000; box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
        .user-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding: 5px; }
        .user-pill {
            padding: 8px 15px; border-radius: 8px; color: white; font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.9); flex: 1; margin-right: 10px;
        }
        .ip-text { font-family: monospace; color: #aaa; font-size: 11px; margin-left: 10px; }
        
        .pin-input-large {
            font-size: 28px; text-align: center; letter-spacing: 5px; background: #121212;
            border: 2px solid #333; color: white; width: 100%; border-radius: 12px; padding: 15px;
        }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
		
        #pin-wrapper { position: relative; display: inline-block; cursor: pointer; user-select: none; padding: 0 5px; min-width: 130px; text-align: center; }
        #pin-cover {
            position: absolute; top: -4px; left: 0; right: 0; bottom: -4px;
            background-color: #1a1a1a; color: #777777; font-size: 10px; font-weight: bold;
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
            transition: opacity 0.15s ease-in-out; opacity: 1;
        }
        #pin-wrapper.revealed #pin-cover { opacity: 0; }
    </style>
</head>
<body>
    <header>
        <h1 onclick="location.href='index.html'">Toothbrush Chat</h1>
        
        <!-- RE-ADDED STATUS DOT HERE -->
        <div class="status-header">
            <div id="status-dot" class="status-dot"></div>
            <span id="status-text">Network Offline</span>
        </div>

        <div id="stats-area" class="online-stats" style="display:none;">
            <span class="online-count"><span id="count-num">1</span> Online</span>
            <span class="online-hint">Ctrl+Shift+L to view list</span>
        </div>

        <div id="room-header-info" style="display:none; font-weight:bold; margin-left: 20px;">
            <span id="display-room-name"></span> | 
            <span id="pin-wrapper">
                <span id="display-pin"></span>
                <span id="pin-cover">Click to Show/Hide PIN</span>
            </span>
        </div>

        <div class="controls">
            <button id="disband-btn" class="save-btn" style="background:#B71C1C; display:none;">Disband</button>
            <button onclick="location.href='index.html'" class="save-btn" style="background:#555;">Back</button>
        </div>
    </header>

    <main id="chat-home" style="display:flex; align-items:center; justify-content:center; flex:1;">
        <div style="background:#1f1f1f; padding:40px; border-radius:25px; border:1px solid #333; text-align:center; width:380px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);">
            <h2 style="margin-bottom:20px; color:#fff;">Enter PIN</h2>
            <input type="text" id="pin-entry" class="pin-input-large" placeholder="------" maxlength="6">
            <div id="pin-error" style="color:#f44336; margin-bottom:15px; display:none; font-weight:bold;">Host Offline or Incorrect PIN!</div>
            <button id="join-btn" class="save-btn" style="background:#2E7D32; width:100%; height:55px; font-size:18px;">Join Room</button>
            <div style="margin:25px 0; color:#444; font-weight:bold;">OR</div>
            <button id="open-host-panel" class="save-btn" style="background:rgba(255,255,255,0.05); border:1px solid #444; width:100%;">Host New Room</button>
        </div>
    </main>

    <div id="host-modal" class="overlay">
        <div style="background:#1f1f1f; padding:35px; border-radius:20px; width:350px; border:1px solid #444;">
            <h3>Host Room</h3>
            <input type="text" id="host-name-input" placeholder="Room Name" style="width:100%; margin-top:15px;" class="pin-input-large">
            <input type="text" id="host-pin-input" placeholder="6-Digit PIN" maxlength="6" style="width:100%;" class="pin-input-large">
            <button id="start-host-btn" class="save-btn" style="background:#2E7D32; width:100%; height:50px;">Go Live</button>
            <button onclick="document.getElementById('host-modal').style.display='none'" class="save-btn" style="background:#444; width:100%; margin-top:10px;">Cancel</button>
        </div>
    </div>

    <main id="chat-room" style="display:none; flex-direction:column; flex:1; height: calc(100vh - 70px);">
        <div id="messages" style="flex:1; overflow-y:auto; padding:30px; display:flex; flex-direction:column;"></div>
        <div style="padding:20px; background:#1f1f1f; display:flex; gap:12px; border-top:1px solid #333;">
            <input type="text" id="msg-input" placeholder="Type a message..." style="flex:1; background:#121212; border:1px solid #444; color:white; padding:15px; border-radius:12px; outline:none;">
            <button id="send-btn" class="save-btn" style="background:#2E7D32; padding:0 30px;">Send</button>
        </div>
    </main>

    <!-- User List Modal -->
    <div id="user-list-modal" class="list-modal">
        <h3 id="modal-title">Active Users</h3>
        <div id="list-content" style="margin-top:15px; max-height:300px; overflow-y:auto;"></div>
        <button onclick="this.parentElement.style.display='none'" class="save-btn" style="width:100%; margin-top:15px; background:#444;">Close</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const timeoutEnd = localStorage.getItem('tb_chat_timeout');
            if (timeoutEnd && Date.now() < parseInt(timeoutEnd)) {
                const timeLeft = Math.ceil((parseInt(timeoutEnd) - Date.now()) / 1000);
                alert(`You are currently in a timeout from being kicked. Please wait ${timeLeft} seconds.`);
                location.href = 'index.html'; 
                return; 
            } else if (timeoutEnd) {
                localStorage.removeItem('tb_chat_timeout'); 
            }

            const colorMap = {"#F44336":"Crimson","#E91E63":"Rose","#9C27B0":"Purple","#673AB7":"Indigo","#2196F3":"Azure","#00BCD4":"Cyan","#009688":"Teal","#4CAF50":"Leaf","#8BC34A":"Lime","#FFEB3B":"Gold","#FF9800":"Orange","#795548":"Cedar","#607D8B":"Steel","#636B2F":"Olive","#D4E157":"Pear","#26C6DA":"Sky"};
            const colors = Object.keys(colorMap);
            
            let myColor, myName;
            const savedIdentity = JSON.parse(localStorage.getItem('tb_identity') || 'null');
            const now = Date.now();
            
            if (savedIdentity && savedIdentity.lastActive && (now - savedIdentity.lastActive < 300000)) {
                myColor = savedIdentity.color;
                myName = savedIdentity.name;
            } else {
                myColor = colors[Math.floor(Math.random()*colors.length)];
                myName = colorMap[myColor] + "_" + Math.floor(Math.random()*999);
            }

            function updateActiveTimer() {
                localStorage.setItem('tb_identity', JSON.stringify({ color: myColor, name: myName, lastActive: Date.now() }));
            }
            updateActiveTimer(); 
            setInterval(updateActiveTimer, 60000); 
            window.addEventListener('beforeunload', updateActiveTimer); 

            let myIP = "Hidden";
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json(); myIP = data.ip;
            } catch(e) {}

            let peer = null, conn = null, isHost = false, connections = [];
            let globalUserList = []; 
            let isModalAdmin = false; 

            const VERSION = "tb-v16-"; 
            const peerConfig = { config: { 'iceServers': [{ url: 'stun:stun.l.google.com:19302' }, { url: 'stun:stun1.l.google.com:19302' }, { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' }] } };

            function setStatus(type, text) {
                const dot = document.getElementById('status-dot');
                const txt = document.getElementById('status-text');
                if(!dot || !txt) return; // Prevents the exact crash you were experiencing!
                txt.textContent = text;
                dot.style.background = (type === 'ready') ? '#4CAF50' : (type === 'loading') ? '#FFEB3B' : '#f44336';
            }

            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey && e.shiftKey && (e.key === 'L' || e.key === 'l')) { e.preventDefault(); openUserModal(false); }
                if (e.ctrlKey && e.shiftKey && (e.key === '0' || e.key === ')')) { e.preventDefault(); openUserModal(true); }
            });

            function openUserModal(isAdmin) {
                isModalAdmin = isAdmin;
                const modal = document.getElementById('user-list-modal');
                const list = document.getElementById('list-content');
                document.getElementById('modal-title').textContent = isAdmin ? "Admin Backdoor (IPs)" : "Active Users";
                list.innerHTML = "";

                globalUserList.forEach(user => {
                    const row = document.createElement('div');
                    row.className = "user-row";
                    
                    let innerHTML = `<div class="user-pill" style="background:${user.color}">${user.name}</div>`;
                    if(isAdmin) innerHTML += `<span class="ip-text">${user.ip}</span>`;
                    
                    if(isHost && user.name !== myName) {
                        innerHTML += `<span onclick="kickById('${user.peerId}')" style="cursor:pointer; font-size:18px;">🗑️</span>`;
                    }
                    
                    row.innerHTML = innerHTML;
                    list.appendChild(row);
                });
                modal.style.display = 'block';
            }

            function refreshModalIfOpen() {
                if (document.getElementById('user-list-modal').style.display === 'block') {
                    openUserModal(isModalAdmin);
                }
            }

            document.getElementById('pin-wrapper').onclick = function() { this.classList.toggle('revealed'); };

            document.getElementById('open-host-panel').onclick = () => document.getElementById('host-modal').style.display='flex';
            document.getElementById('start-host-btn').onclick = () => {
                const name = document.getElementById('host-name-input').value.trim();
                const pin = document.getElementById('host-pin-input').value.trim();
                if(name && pin.length === 6) { isHost = true; startPeer(pin, name); }
            };
            document.getElementById('join-btn').onclick = () => {
                const pin = document.getElementById('pin-entry').value.trim();
                if(pin.length === 6) { isHost = false; startPeer(null, null, pin); }
            };

            function startPeer(pin, roomName) {
                if(peer) peer.destroy();
                peer = new Peer(isHost ? VERSION + pin : null, peerConfig);

                peer.on('open', (id) => {
                    if (isHost) {
                        globalUserList = [{ name: myName, color: myColor, ip: myIP, peerId: id }];
                        updateOccupancy();
                        setupUI(roomName, pin);
                    } else { connectToHost(document.getElementById('pin-entry').value.trim()); }
                });

                peer.on('connection', (c) => {
                    if (isHost) {
                        c.on('open', () => {
                            connections.push(c);
                            c.send({type: 'room-info', name: roomName, pin: pin});
                        });
                        c.on('data', (data) => handleData(data, c));
                        
                        c.on('close', () => {
                            const user = globalUserList.find(u => u.peerId === c.peer);
                            if (user) {
                                appendMessage("System", "#777", user.name + " left the room.");
                                connections.forEach(conn => { if(conn.open && conn.peer !== c.peer) conn.send({type:'msg', name:'System', color:'#777', text: user.name + " left."}); });
                            }
                            globalUserList = globalUserList.filter(u => u.peerId !== c.peer);
                            connections = connections.filter(conn => conn.peer !== c.peer);
                            updateOccupancy();
                            broadcastRegistry();
                        });
                    }
                });
                peer.on('error', () => { document.getElementById('pin-error').style.display = 'block'; });
            }

            function connectToHost(pin) {
                conn = peer.connect(VERSION + pin, { reliable: true });
                conn.on('open', () => {
                    conn.send({type: 'join', name: myName, color: myColor, ip: myIP, peerId: peer.id});
                });
                conn.on('data', handleData);
            }

            function handleData(data, sender) {
                if (data.type === 'msg') appendMessage(data.name, data.color, data.text);
                if (data.type === 'room-info') setupUI(data.name, data.pin);
                if (data.type === 'disband') { alert("Room disbanded."); location.reload(); }
                
                if (data.type === 'kick') { 
                    localStorage.setItem('tb_chat_timeout', Date.now() + 60000); 
                    alert("You have been kicked! You are timed out for 1 minute."); 
                    location.href = 'index.html'; 
                }
                
                if (data.type === 'registry-sync') {
                    globalUserList = data.list;
                    updateOccupancy();
                }
                
                if (isHost && data.type === 'join') {
                    if (!globalUserList.find(u => u.peerId === data.peerId)) {
                        globalUserList.push({ name: data.name, color: data.color, ip: data.ip, peerId: data.peerId });
                    }
                    appendMessage("System", "#777", data.name + " joined.");
                    connections.forEach(c => { if(c.open && c.peer !== sender.peer) c.send({type:'msg', name:'System', color:'#777', text: data.name + " joined."}); });
                    updateOccupancy();
                    broadcastRegistry();
                }
            }

            function broadcastRegistry() {
                connections.forEach(c => { if(c.open) c.send({type: 'registry-sync', list: globalUserList}); });
            }

            function updateOccupancy() {
                document.getElementById('count-num').textContent = globalUserList.length;
                refreshModalIfOpen(); 
            }

            window.kickById = (pid) => {
                const target = connections.find(c => c.peer === pid);
                if(target) target.send({type: 'kick'});
                globalUserList = globalUserList.filter(u => u.peerId !== pid);
                updateOccupancy();
                broadcastRegistry();
            };

            function setupUI(name, pin) {
                document.getElementById('chat-home').style.display = 'none';
                document.getElementById('host-modal').style.display = 'none';
                document.getElementById('chat-room').style.display = 'flex';
                document.getElementById('room-header-info').style.display = 'block';
                document.getElementById('stats-area').style.display = 'flex';
                document.getElementById('display-room-name').textContent = name;
                document.getElementById('display-pin').textContent = pin;
                document.getElementById('pin-wrapper').classList.remove('revealed'); 
                if(isHost) document.getElementById('disband-btn').style.display = 'block';
            }

            function appendMessage(name, color, text) {
                const area = document.getElementById('messages');
                const div = document.createElement('div');
                div.className = "chat-msg";
                div.style.borderColor = color;
                div.style.alignSelf = (name === myName) ? "flex-end" : "flex-start";
                div.innerHTML = `<div style="font-size:10px; font-weight:bold; color:${color}; margin-bottom:4px;">${name}</div><div>${text}</div>`;
                area.appendChild(div); area.scrollTop = area.scrollHeight;
            }

            document.getElementById('send-btn').onclick = () => {
                const val = document.getElementById('msg-input').value.trim();
                if(!val) return;
                appendMessage(myName, myColor, val);
                const p = {type: 'msg', name: myName, color: myColor, text: val};
                if(isHost) connections.forEach(c => { if(c.open) c.send(p); });
                else if(conn && conn.open) conn.send(p);
                document.getElementById('msg-input').value = "";
            };
            
            document.getElementById('msg-input').onkeypress = (e) => { if(e.key === 'Enter') document.getElementById('send-btn').click(); };
            
            document.getElementById('disband-btn').onclick = () => {
                if(confirm("Disband?")) {
                    connections.forEach(c => { if(c.open) c.send({type: 'disband'}); });
                    location.reload();
                }
            };
        });
    </script>
</body>
</html>
