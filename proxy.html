<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Tab</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #1a1a1a;
            /* Zigzag Pattern */
            background-image:  linear-gradient(135deg, #1f1f1f 25%, transparent 25%), linear-gradient(225deg, #1f1f1f 25%, transparent 25%), linear-gradient(45deg, #1f1f1f 25%, transparent 25%), linear-gradient(315deg, #1f1f1f 25%, transparent 25%);
            background-position:  40px 0, 40px 0, 0 0, 0 0;
            background-size: 80px 80px;
            background-repeat: repeat;
            animation: moveBackground 40s linear infinite;
            display: flex;
            flex-direction: column;
        }

        @keyframes moveBackground {
            from { background-position: 40px 0, 40px 0, 0 0, 0 0; }
            to { background-position: 540px 500px, 540px 500px, 500px 500px, 500px 500px; }
        }

        .proxy-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        .proxy-box {
            background: #1f1f1f;
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 600px;
            text-align: center;
        }

        .proxy-input {
            width: 100%;
            padding: 15px;
            background: #121212;
            border: 2px solid #333;
            border-radius: 10px;
            color: white;
            font-size: 18px;
            margin: 20px 0;
            outline: none;
            transition: border-color 0.3s;
        }

        .proxy-input:focus { border-color: #00BCD4; }

        .watermark {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 12px;
            color: #777;
            font-family: sans-serif;
        }
    </style>
</head>
<body>
    <header>
        <h1 onclick="location.href='index.html'">Toothbrush Proxy</h1>
        <div class="controls">
            <button onclick="location.href='index.html'" class="save-btn" style="background-color: #555;">Back</button>
        </div>
    </header>

    <main class="proxy-container">
        <div class="proxy-box">
            <h2>Enter URL</h2>
            <input type="text" id="url-input" class="proxy-input" placeholder="e.g. google.com" autocomplete="off">
            <button id="launch-btn" class="save-btn" style="background-color: #00BCD4; width: 100%; font-size: 16px;">Launch Proxy</button>
        </div>
    </main>

    <div class="watermark">Using CroxyProxy</div>

    <script>
        const input = document.getElementById('url-input');
const btn = document.getElementById('launch-btn');

function launchProxy() {
    let url = input.value.trim();
    if (!url) return alert("Please enter a URL");

    // 1. Open the about:blank window first
    const win = window.open('about:blank', '_blank');
    if (!win) return alert("Pop-up blocked! Please allow pop-ups.");

    // 2. Format the URL for the user if they forgot https
    if (!url.startsWith('http')) {
        url = 'https://' + url;
    }

    // 3. Create the stealth content for the new window
    // This creates a hidden form inside the about:blank page and submits it to CroxyProxy
    const proxyContent = `
        <!DOCTYPE html>
        <html>
        <head>
            <title>New Tab</title>
            <style>
                body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
                iframe { width: 100%; height: 100%; border: none; }
            </style>
        </head>
        <body>
            <!-- The Hidden Form Bridge -->
            <form id="proxy-form" action="https://www.croxyproxy.com/_pi/get" method="GET" style="display:none;">
                <input type="hidden" name="url" value="${url}">
            </form>

            <script>
                // Automatically submit the form as soon as the about:blank page loads
                document.getElementById('proxy-form').submit();
            <\/script>
        </body>
        </html>
    `;

    // 4. Inject the bridge into the about:blank window
    win.document.open();
    win.document.write(proxyContent);
    win.document.close();
}

btn.onclick = launchProxy;
input.onkeypress = (e) => { if(e.key === 'Enter') launchProxy(); };
    </script>
</body>
</html>
