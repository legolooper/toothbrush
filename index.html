<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toothbrush</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
    <h1 onclick="window.location.href='index.html'" style="cursor:pointer">Toothbrush</h1>

    <div class="controls">
        <!-- Pink Button -->
        <button id="cloak-btn" class="save-btn" style="background-color: #E91E63;">Fullscreen</button>
        
        <!-- NEW: Dark Orange Stash Button (Moved here) -->
        <button onclick="window.location.href='pdf-stash.html'" class="save-btn" style="background-color: #F57C00;">Stash</button>
        
        <!-- Blue Help Button -->
        <button onclick="window.location.href='help.html'" class="save-btn" style="background-color: #2196F3;">Help</button>
        
        <!-- Green Backup/Restore Buttons -->
        <button id="export-btn" class="save-btn">Backup</button>
        <input type="file" id="import-btn" accept=".json" style="display:none">
        <button onclick="document.getElementById('import-btn').click()" class="save-btn">Restore</button>
    </div>
</header>
    <main>
        <aside class="sidebar">
            <h2>Game List</h2>
			<button id="remove-mode-btn" class="save-btn" style="background-color: #f44336; width: 100%; margin-bottom: 10px;">
    Remove Game: OFF
</button>

            <ul id="game-list"></ul>
            <div class="add-game">
                <h3>Add Local Game</h3>
                <input type="text" id="new-game-title" placeholder="Game Title">
                <input type="file" id="new-game-file" accept=".html">
                <button id="add-game-btn">Add Game</button>
            </div>
        </aside>
        <section class="game-container">
            <iframe id="game-frame" name="game-frame" title="Game Window"></iframe>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
