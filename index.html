<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unblocked Games</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Unblocked Games</h1>
        <nav class="top-nav">
    <a href="pdf-stash.html" class="nav-btn">Stash</a>
        </nav>
        <div class="controls">
            <button id="cloak-btn" class="save-btn" style="background-color: #E91E63;">Cloak (about:blank)</button>
            <button id="export-btn" class="save-btn">Backup</button>
            <input type="file" id="import-btn" accept=".json" style="display:none">
            <button onclick="document.getElementById('import-btn').click()" class="save-btn">Restore</button>
        </div>
    </header>
    <main>
        <aside class="sidebar">
            <h2>Game List</h2>
            <ul id="game-list"></ul>
            <div class="add-game">
                <h3>Add Local Game</h3>
                <input type="text" id="new-game-title" placeholder="Game Title">
                <input type="file" id="new-game-file" accept=".html">
                <button id="add-game-btn">Add Game</button>
            </div>
        </aside>
        <section class="game-container">
            <iframe id="game-frame" name="game-frame" title="Game Window"></iframe>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
